name: release-drafter
on:
  workflow_dispatch: {}
  push:
    branches:
      - main
jobs:
  release-drafter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Get Next Version
        id: semver
        uses: ietf-tools/semver-action@c90370b2958652d71c06a3484129a4d423a6d8a8 # v1
        with:
          token: ${{ github.token }}
          branch: main
          majorList: breaking
          minorList: feat, feature
          patchList: fix, bugfix, perf, refactor, test, tests, chore, doc
      - name: Draft Release
        uses: release-drafter/release-drafter@5de93583980a40bd78603b6dfdcda5b4df377b32 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commitish: main
          disable-autolabeler: true
          version: ${{ steps.semver.outputs.next }}
